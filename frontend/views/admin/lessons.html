<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../public/favicon.png">
    <title>Manage Lessons - LearnPremium Admin</title>
    <link rel="stylesheet" href="../../public/css/style.css">
    <link rel="stylesheet" href="../../public/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Pyodide for real Python execution -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        /* ... (keep all existing styles) ... */
        
        .python-compiler-section {
            background: var(--bg-primary);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .compiler-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .compiler-header h2 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .compiler-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .compiler-editor {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .code-editor-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #6366f1;
        }
        
        .code-editor {
            width: 100%;
            min-height: 300px;
            font-family: 'Courier New', 'Consolas', monospace;
            background: #1e1e2e;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            tab-size: 4;
        }
        
        .code-editor:focus {
            outline: none;
            background: #252533;
        }
        
        .editor-line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: #16162a;
            color: #858585;
            padding: 20px 10px;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            user-select: none;
        }
        
        .btn-run {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .btn-run:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-run:active {
            transform: translateY(0);
        }
        
        .btn-run:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-clear {
            background: #6b7280;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-clear:hover {
            background: #4b5563;
        }
        
        .output-container {
            background: #111827;
            border-radius: 12px;
            border: 2px solid #374151;
            overflow: hidden;
        }
        
        .output-header {
            background: #1f2937;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
        }
        
        .output-header span {
            font-weight: 600;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .output-content {
            padding: 15px 20px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #e5e7eb;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .output-content.error {
            color: #f87171;
        }
        
        .output-content.success {
            color: #34d399;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.ready {
            background: #10b98120;
            color: #10b981;
        }
        
        .status-badge.running {
            background: #f59e0b20;
            color: #f59e0b;
        }
        
        .status-badge.error {
            background: #ef444420;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <!-- ... (keep existing sidebar) ... -->
            <div class="admin-brand">
                <i class="fas fa-graduation-cap"></i>
                <span>LearnPremium</span>
                <small>Admin Panel</small>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="students.html"><i class="fas fa-users"></i> Students</a>
                <a href="courses.html"><i class="fas fa-book"></i> Courses</a>
                <a href="lessons.html" class="active"><i class="fas fa-list"></i> Lessons</a>
                <a href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="../../index.html"><i class="fas fa-external-link-alt"></i> View Site</a>
                <button onclick="localStorage.clear(); window.location.href='/';" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>Manage Lessons</h1>
            </header>

            <div class="admin-content">
                <div class="success-message" id="successMessage"></div>

                <!-- Working Python Compiler Section -->
                <div class="python-compiler-section">
                    <div class="compiler-header">
                        <h2>
                            <i class="fas fa-python" style="color: #3776AB;"></i>
                            Python Compiler
                        </h2>
                        <div class="compiler-controls">
                            <span id="compilerStatus" class="status-badge ready">
                                <i class="fas fa-circle"></i> Ready
                            </span>
                            <button class="btn-clear" onclick="clearEditor()">
                                <i class="fas fa-eraser"></i> Clear
                            </button>
                        </div>
                    </div>
                    
                    <div class="compiler-editor">
                        <div class="code-editor-wrapper">
                            <textarea 
                                id="pythonCode" 
                                class="code-editor" 
                                placeholder="# Write your Python code here...&#10;print('Hello, World!')&#10;&#10;# Try something more complex:&#10;for i in range(5):&#10;    print(f'Number {i}')"
                                spellcheck="false"
                            >print('Hello, World!')
print('Welcome to Python Compiler')

# Let's do some calculations
result = sum(range(1, 11))
print(f'Sum of 1 to 10 = {result}')

# Working with lists
numbers = [1, 2, 3, 4, 5]
squares = [x**2 for x in numbers]
print(f'Squares: {squares}')</textarea>
                        </div>
                        
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button id="runPythonBtn" class="btn-run">
                                <i class="fas fa-play"></i> Run Code
                            </button>
                            <span style="color: #6b7280; font-size: 14px;">
                                <i class="fas fa-keyboard"></i> Ctrl + Enter to run
                            </span>
                        </div>
                    </div>
                    
                    <div class="output-container" style="margin-top: 20px;">
                        <div class="output-header">
                            <span><i class="fas fa-terminal"></i> Output</span>
                            <span id="executionTime" style="font-size: 12px;"></span>
                        </div>
                        <div id="pythonOutput" class="output-content">
                            Click "Run Code" to see output here...
                        </div>
                    </div>
                </div>

                <!-- Add Lesson Form -->
                <!-- ... (keep existing form) ... -->
                <div class="lesson-form-card">
                    <!-- ... existing lesson form content ... -->
                </div>

                <!-- Lessons List -->
                <!-- ... (keep existing table) ... -->
            </div>
        </main>
    </div>

    <script src="../../js/config.js"></script>
    <script>
        // ============ REAL PYTHON COMPILER USING PYODIDE ============
        let pyodideInstance = null;
        let isPyodideLoading = false;
        let isPyodideReady = false;

        // Initialize Pyodide (real Python runtime)
        async function initializePyodide() {
            const statusElement = document.getElementById('compilerStatus');
            
            if (isPyodideReady) {
                return true;
            }
            
            if (isPyodideLoading) {
                // Wait for existing loading process
                while (isPyodideLoading) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                return isPyodideReady;
            }
            
            isPyodideLoading = true;
            statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading Python...';
            statusElement.className = 'status-badge running';
            
            try {
                // Load Pyodide with packages
                pyodideInstance = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/"
                });
                
                // Load common Python packages
                await pyodideInstance.loadPackage(['numpy', 'micropip']);
                
                isPyodideReady = true;
                statusElement.innerHTML = '<i class="fas fa-circle"></i> Ready';
                statusElement.className = 'status-badge ready';
                console.log('✅ Pyodide initialized successfully - Real Python runtime ready');
                
            } catch (error) {
                console.error('Failed to initialize Pyodide:', error);
                statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed to load';
                statusElement.className = 'status-badge error';
                isPyodideReady = false;
                throw error;
            } finally {
                isPyodideLoading = false;
            }
        }

        // Execute Python code
        async function executePythonCode(code) {
            const outputElement = document.getElementById('pythonOutput');
            const statusElement = document.getElementById('compilerStatus');
            const timeElement = document.getElementById('executionTime');
            const runButton = document.getElementById('runPythonBtn');
            
            if (!code.trim()) {
                outputElement.textContent = 'Please enter some Python code to execute.';
                outputElement.className = 'output-content error';
                return;
            }
            
            // Disable button during execution
            runButton.disabled = true;
            runButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
            statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Executing...';
            statusElement.className = 'status-badge running';
            outputElement.textContent = '';
            outputElement.className = 'output-content';
            
            const startTime = performance.now();
            
            try {
                // Ensure Pyodide is ready
                if (!isPyodideReady) {
                    await initializePyodide();
                }
                
                if (!isPyodideReady) {
                    throw new Error('Python runtime is not available');
                }
                
                // Redirect stdout to capture print statements
                await pyodideInstance.runPythonAsync(`
import sys
import io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
                `);
                
                // Execute the user's code
                await pyodideInstance.runPythonAsync(code);
                
                // Get the captured output
                const stdout = pyodideInstance.runPython('sys.stdout.getvalue()');
                const stderr = pyodideInstance.runPython('sys.stderr.getvalue()');
                
                // Restore stdout and stderr
                pyodideInstance.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
                `);
                
                const endTime = performance.now();
                const executionTime = (endTime - startTime).toFixed(2);
                
                // Display output
                let output = '';
                if (stdout) {
                    output += stdout;
                }
                if (stderr) {
                    output += (output ? '\n' : '') + '⚠️ Errors:\n' + stderr;
                }
                
                outputElement.textContent = output || 'Program executed successfully (no output)';
                outputElement.className = 'output-content success';
                timeElement.textContent = `Execution time: ${executionTime}ms`;
                
                statusElement.innerHTML = '<i class="fas fa-check-circle"></i> Execution complete';
                statusElement.className = 'status-badge ready';
                
            } catch (error) {
                const endTime = performance.now();
                const executionTime = (endTime - startTime).toFixed(2);
                
                console.error('Python execution error:', error);
                
                // Format error message
                let errorMessage = error.message || 'Unknown error occurred';
                
                // Clean up Pyodide error messages
                errorMessage = errorMessage.replace(/^PythonError: /, '');
                errorMessage = errorMessage.replace(/Traceback \(most recent call last\):\n/, '');
                
                outputElement.textContent = `❌ Error:\n${errorMessage}`;
                outputElement.className = 'output-content error';
                timeElement.textContent = `Failed after: ${executionTime}ms`;
                
                statusElement.innerHTML = '<i class="fas fa-times-circle"></i> Error';
                statusElement.className = 'status-badge error';
                
                // Try to restore stdout
                try {
                    pyodideInstance.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
                    `);
                } catch (e) {
                    // Ignore restoration errors
                }
            } finally {
                // Re-enable button
                runButton.disabled = false;
                runButton.innerHTML = '<i class="fas fa-play"></i> Run Code';
            }
        }

        // Clear editor
        function clearEditor() {
            document.getElementById('pythonCode').value = '';
            document.getElementById('pythonOutput').textContent = 'Editor cleared. Write your code and click Run.';
            document.getElementById('pythonOutput').className = 'output-content';
            document.getElementById('executionTime').textContent = '';
        }

        // ============ INITIALIZE COMPILER ============
        window.addEventListener('load', async () => {
            console.log('🚀 Initializing Python compiler...');
            
            // Start loading Pyodide in the background
            initializePyodide().catch(error => {
                console.warn('Background Pyodide initialization failed:', error);
            });
            
            // Run button click handler
            const runButton = document.getElementById('runPythonBtn');
            runButton.addEventListener('click', () => {
                const code = document.getElementById('pythonCode').value;
                executePythonCode(code);
            });
            
            // Ctrl+Enter shortcut
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    const code = document.getElementById('pythonCode').value;
                    executePythonCode(code);
                }
            });
            
            // Initial example code execution (optional)
            setTimeout(() => {
                if (isPyodideReady) {
                    const initialCode = document.getElementById('pythonCode').value;
                    if (initialCode.trim()) {
                        console.log('Running initial example code...');
                        executePythonCode(initialCode);
                    }
                }
            }, 2000);
        });

        // ============ EXISTING LESSON MANAGEMENT CODE ============
        const token = localStorage.getItem('adminToken') || localStorage.getItem('token');
        let allCourses = [];
        let allLessons = [];

        // ... (keep all existing lesson management functions exactly as they were) ...
        
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE}/courses`);
                const data = await response.json();
                
                if (data.courses) {
                    allCourses = data.courses;
                    
                    const courseSelect = document.getElementById('courseSelect');
                    const filterCourse = document.getElementById('filterCourse');
                    
                    const options = data.courses.map(c => 
                        `<option value="${c._id}">${c.title}</option>`
                    ).join('');
                    
                    courseSelect.innerHTML = '<option value="">Choose a course...</option>' + options;
                    filterCourse.innerHTML = '<option value="">All Courses</option>' + options;
                }
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }

        function loadModules() {
            const courseId = document.getElementById('courseSelect').value;
            const course = allCourses.find(c => c._id === courseId);
            const moduleSelect = document.getElementById('moduleSelect');
            
            if (course && course.modules) {
                moduleSelect.innerHTML = course.modules.map(m => 
                    `<option value="${m.order}">Module ${m.order}: ${m.title}</option>`
                ).join('');
            } else {
                moduleSelect.innerHTML = '<option value="">Choose a module...</option>';
            }
        }

        async function loadLessons() {
            const filterCourseId = document.getElementById('filterCourse').value;
            
            try {
                let url = `${API_BASE}/lessons`;
                if (filterCourseId) {
                    url = `${API_BASE}/lessons/course/${filterCourseId}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                allLessons = data.lessons || [];
                renderLessonsTable(allLessons);
            } catch (error) {
                console.error('Error loading lessons:', error);
            }
        }

        function renderLessonsTable(lessons) {
            const tbody = document.getElementById('lessonsTableBody');
            
            if (lessons.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">No lessons found</td></tr>';
                return;
            }
            
            tbody.innerHTML = lessons.map(lesson => {
                const course = allCourses.find(c => c._id === lesson.courseId);
                return `
                    <tr>
                        <td><strong>${lesson.title}</strong></td>
                        <td>${course?.title || 'N/A'}</td>
                        <td>Module ${lesson.moduleId}</td>
                        <td><span class="badge badge-info">${lesson.type}</span></td>
                        <td>${lesson.order}</td>
                        <td>
                            <button class="btn-sm btn-edit" onclick="editLesson('${lesson._id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-sm btn-delete" onclick="deleteLesson('${lesson._id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('lessonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const lessonId = document.getElementById('lessonId').value;
            const data = {
                courseId: document.getElementById('courseSelect').value,
                moduleId: document.getElementById('moduleSelect').value,
                title: document.getElementById('lessonTitle').value,
                description: document.getElementById('lessonDescription').value,
                content: document.getElementById('lessonContent').value,
                videoUrl: document.getElementById('lessonVideoUrl').value,
                duration: document.getElementById('lessonDuration').value,
                type: document.getElementById('lessonType').value,
                order: parseInt(document.getElementById('lessonOrder').value),
                isFree: document.getElementById('lessonIsFree').checked
            };
            
            const url = lessonId ? `${API_BASE}/lessons/${lessonId}` : `${API_BASE}/lessons`;
            const method = lessonId ? 'PUT' : 'POST';
            
            try {
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showSuccess(lessonId ? 'Lesson updated!' : 'Lesson added successfully!');
                    resetForm();
                    loadLessons();
                } else {
                    const err = await response.json();
                    alert(err.message || 'Operation failed');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });

        function editLesson(id) {
            const lesson = allLessons.find(l => l._id === id);
            if (!lesson) return;
            
            document.getElementById('lessonId').value = lesson._id;
            document.getElementById('courseSelect').value = lesson.courseId;
            loadModules();
            setTimeout(() => {
                document.getElementById('moduleSelect').value = lesson.moduleId;
            }, 100);
            document.getElementById('lessonTitle').value = lesson.title;
            document.getElementById('lessonDescription').value = lesson.description || '';
            document.getElementById('lessonContent').value = lesson.content || '';
            document.getElementById('lessonVideoUrl').value = lesson.videoUrl || '';
            document.getElementById('lessonDuration').value = lesson.duration || '30 min';
            document.getElementById('lessonType').value = lesson.type || 'article';
            document.getElementById('lessonOrder').value = lesson.order || 1;
            document.getElementById('lessonIsFree').checked = lesson.isFree !== false;
            document.getElementById('submitText').textContent = 'Update Lesson';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteLesson(id) {
            if (!confirm('Are you sure you want to delete this lesson?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/lessons/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    showSuccess('Lesson deleted!');
                    loadLessons();
                }
            } catch (error) {
                alert('Error deleting lesson');
            }
        }

        function resetForm() {
            document.getElementById('lessonForm').reset();
            document.getElementById('lessonId').value = '';
            document.getElementById('submitText').textContent = 'Add Lesson';
        }

        function showSuccess(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // Initialize everything
        loadCourses();
        loadLessons();
    </script>
</body>
