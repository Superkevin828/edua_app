<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Lessons - LearnPremium Admin</title>
    <link rel="stylesheet" href="../../public/css/style.css">
    <link rel="stylesheet" href="../../public/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .lesson-form-card {
            background: var(--bg-primary);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .lesson-form-card h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .form-control:focus {
            outline: none;
            border-color: #6366f1;
        }
        textarea.form-control {
            resize: vertical;
            font-family: inherit;
        }
        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .lessons-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .lessons-table th {
            text-align: left;
            padding: 12px;
            background: var(--bg-secondary);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .lessons-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            margin-right: 5px;
        }
        .btn-edit {
            background: #6366f1;
            color: white;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <i class="fas fa-graduation-cap"></i>
                <span>LearnPremium</span>
                <small>Admin Panel</small>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="students.html"><i class="fas fa-users"></i> Students</a>
                <a href="courses.html"><i class="fas fa-book"></i> Courses</a>
                <a href="lessons.html" class="active"><i class="fas fa-list"></i> Lessons</a>
                <a href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="../../index.html"><i class="fas fa-external-link-alt"></i> View Site</a>
                <button onclick="localStorage.clear(); window.location.href='/';" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>Manage Lessons</h1>
            </header>

            <div class="admin-content">
                <div class="success-message" id="successMessage"></div>

                <!-- Add Lesson Form -->
                <div class="lesson-form-card">
                    <h2><i class="fas fa-plus-circle"></i> Add New Lesson</h2>
                    <form id="lessonForm">
                        <input type="hidden" id="lessonId">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="courseSelect">Select Course</label>
                                <select id="courseSelect" class="form-control" required onchange="loadModules()">
                                    <option value="">Choose a course...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="moduleSelect">Module</label>
                                <select id="moduleSelect" class="form-control" required>
                                    <option value="">Choose a module...</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="lessonTitle">Lesson Title</label>
                            <input type="text" id="lessonTitle" class="form-control" placeholder="e.g., Introduction to Variables" required>
                        </div>

                        <div class="form-group">
                            <label for="lessonDescription">Description</label>
                            <input type="text" id="lessonDescription" class="form-control" placeholder="Brief description of the lesson">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="lessonDuration">Duration</label>
                                <input type="text" id="lessonDuration" class="form-control" placeholder="e.g., 45 min" value="30 min">
                            </div>
                            <div class="form-group">
                                <label for="lessonType">Type</label>
                                <select id="lessonType" class="form-control">
                                    <option value="article">Article</option>
                                    <option value="video">Video</option>
                                    <option value="quiz">Quiz</option>
                                    <option value="project">Project</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="lessonOrder">Order</label>
                                <input type="number" id="lessonOrder" class="form-control" value="1" min="1">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="lessonIsFree" checked> Free Lesson (available to all users)
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="lessonContent">Lesson Content (HTML)</label>
                            <textarea id="lessonContent" class="form-control" rows="12" placeholder="Enter lesson content in HTML format..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="lessonVideoUrl">Video URL (optional)</label>
                            <input type="text" id="lessonVideoUrl" class="form-control" placeholder="https://youtube.com/...">
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> <span id="submitText">Add Lesson</span>
                        </button>
                        <button type="button" class="btn-primary" style="background: #6b7280; margin-left: 10px;" onclick="resetForm()">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </form>
                </div>

                <!-- Lessons List -->
                <div class="lesson-form-card">
                    <h2><i class="fas fa-list"></i> Existing Lessons</h2>
                    <div class="form-group">
                        <label for="filterCourse">Filter by Course</label>
                        <select id="filterCourse" class="form-control" onchange="loadLessons()">
                            <option value="">All Courses</option>
                        </select>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="lessons-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Course</th>
                                    <th>Module</th>
                                    <th>Type</th>
                                    <th>Order</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="lessonsTableBody">
                                <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('adminToken') || localStorage.getItem('token');
        let allCourses = [];
        let allLessons = [];

        // Load courses for dropdowns
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE}/courses`);
                const data = await response.json();
                
                if (data.courses) {
                    allCourses = data.courses;
                    
                    const courseSelect = document.getElementById('courseSelect');
                    const filterCourse = document.getElementById('filterCourse');
                    
                    const options = data.courses.map(c => 
                        `<option value="${c._id}">${c.title}</option>`
                    ).join('');
                    
                    courseSelect.innerHTML = '<option value="">Choose a course...</option>' + options;
                    filterCourse.innerHTML = '<option value="">All Courses</option>' + options;
                }
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }

        // Load modules when course is selected
        function loadModules() {
            const courseId = document.getElementById('courseSelect').value;
            const course = allCourses.find(c => c._id === courseId);
            const moduleSelect = document.getElementById('moduleSelect');
            
            if (course && course.modules) {
                moduleSelect.innerHTML = course.modules.map(m => 
                    `<option value="${m.order}">Module ${m.order}: ${m.title}</option>`
                ).join('');
            } else {
                moduleSelect.innerHTML = '<option value="">Choose a module...</option>';
            }
        }

        // Load all lessons
        async function loadLessons() {
            const filterCourseId = document.getElementById('filterCourse').value;
            
            try {
                let url = '${API_BASE}/lessons';
                if (filterCourseId) {
                    url = `${API_BASE}/lessons/course/${filterCourseId}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                allLessons = data.lessons || [];
                renderLessonsTable(allLessons);
            } catch (error) {
                console.error('Error loading lessons:', error);
            }
        }

        // Render lessons table
        function renderLessonsTable(lessons) {
            const tbody = document.getElementById('lessonsTableBody');
            
            if (lessons.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">No lessons found</td></tr>';
                return;
            }
            
            tbody.innerHTML = lessons.map(lesson => {
                const course = allCourses.find(c => c._id === lesson.courseId);
                return `
                    <tr>
                        <td><strong>${lesson.title}</strong></td>
                        <td>${course?.title || 'N/A'}</td>
                        <td>Module ${lesson.moduleId}</td>
                        <td><span class="badge badge-info">${lesson.type}</span></td>
                        <td>${lesson.order}</td>
                        <td>
                            <button class="btn-sm btn-edit" onclick="editLesson('${lesson._id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-sm btn-delete" onclick="deleteLesson('${lesson._id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Add/Edit lesson
        document.getElementById('lessonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const lessonId = document.getElementById('lessonId').value;
            const data = {
                courseId: document.getElementById('courseSelect').value,
                moduleId: document.getElementById('moduleSelect').value,
                title: document.getElementById('lessonTitle').value,
                description: document.getElementById('lessonDescription').value,
                content: document.getElementById('lessonContent').value,
                videoUrl: document.getElementById('lessonVideoUrl').value,
                duration: document.getElementById('lessonDuration').value,
                type: document.getElementById('lessonType').value,
                order: parseInt(document.getElementById('lessonOrder').value),
                isFree: document.getElementById('lessonIsFree').checked
            };
            
            const url = lessonId ? `${API_BASE}/lessons/${lessonId}` : `${API_BASE}/lessons';
            const method = lessonId ? 'PUT' : 'POST';
            
            try {
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showSuccess(lessonId ? 'Lesson updated!' : 'Lesson added successfully!');
                    resetForm();
                    loadLessons();
                } else {
                    const err = await response.json();
                    alert(err.message || 'Operation failed');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });

        // Edit lesson
        function editLesson(id) {
            const lesson = allLessons.find(l => l._id === id);
            if (!lesson) return;
            
            document.getElementById('lessonId').value = lesson._id;
            document.getElementById('courseSelect').value = lesson.courseId;
            loadModules();
            setTimeout(() => {
                document.getElementById('moduleSelect').value = lesson.moduleId;
            }, 100);
            document.getElementById('lessonTitle').value = lesson.title;
            document.getElementById('lessonDescription').value = lesson.description || '';
            document.getElementById('lessonContent').value = lesson.content || '';
            document.getElementById('lessonVideoUrl').value = lesson.videoUrl || '';
            document.getElementById('lessonDuration').value = lesson.duration || '30 min';
            document.getElementById('lessonType').value = lesson.type || 'article';
            document.getElementById('lessonOrder').value = lesson.order || 1;
            document.getElementById('lessonIsFree').checked = lesson.isFree !== false;
            document.getElementById('submitText').textContent = 'Update Lesson';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete lesson
        async function deleteLesson(id) {
            if (!confirm('Are you sure you want to delete this lesson?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/lessons/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    showSuccess('Lesson deleted!');
                    loadLessons();
                }
            } catch (error) {
                alert('Error deleting lesson');
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('lessonForm').reset();
            document.getElementById('lessonId').value = '';
            document.getElementById('submitText').textContent = 'Add Lesson';
        }

        // Show success message
        function showSuccess(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // Initialize
        loadCourses();
        loadLessons();
    </script>
    <script src="../../js/config.js"></script>
</body>
</html>
